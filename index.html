<!--
  TRIVISOR — visualizador de música com 3 modos
  ----------------------------------------------
  [1] VECTORSCOPE  Lissajous estéreo: canal L -> X, canal R -> Y (fio de neon)
  [2] TERRENO      heightmap de frequências em perspectiva, rolando ao horizonte
  [3] ÍRIS         espectro radial espelhado + anel de waveform, gira com o beat

  Motor de áudio único: splitter estéreo -> 2 analisadores (time domain p/ o
  vectorscope) + 1 analisador master (espectro p/ terreno e íris) + beat detect.
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#05070f" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SoundMe" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="icon" href="./icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="./icon.svg" />
<title>SoundMe</title>
<style>
  :root{
    --bg:#05070f;
    --heat:#ff4d2e; --plasma:#22e0c8; --arc:#a24bff;
    --fg:#ffb347; --dim:#66748a;
    --panel:rgba(7,10,20,.78);
    --mono:"SFMono-Regular",ui-monospace,"JetBrains Mono","Consolas",monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);overflow:hidden;
    font-family:var(--mono);color:var(--fg);-webkit-font-smoothing:antialiased}
  #stage{position:fixed;inset:0}

  /* -------- barra superior: modos -------- */
  #modes{position:fixed;top:16px;left:50%;transform:translateX(-50%);
    display:flex;gap:6px;z-index:10;background:var(--panel);
    border:1px solid rgba(255,179,71,.16);border-radius:10px;padding:5px;
    backdrop-filter:blur(10px);box-shadow:0 10px 34px rgba(0,0,0,.55)}
  .mode{border:none;background:none;color:var(--dim);cursor:pointer;
    font-family:var(--mono);font-size:10.5px;letter-spacing:1.6px;
    text-transform:uppercase;padding:8px 14px;border-radius:7px;
    transition:color .15s,background .15s;display:flex;align-items:center;gap:7px}
  .mode small{opacity:.55;font-size:9px}
  .mode:hover{color:#cdd6e4}
  .mode.on{background:rgba(255,179,71,.13);color:var(--fg)}
  .mode.on .k{background:var(--fg);color:#111}
  .k{display:inline-flex;align-items:center;justify-content:center;
    width:15px;height:15px;border-radius:4px;font-size:9px;
    background:rgba(255,255,255,.10);color:var(--dim)}

  /* -------- barra inferior: transporte -------- */
  #dock{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;gap:9px;z-index:10;background:var(--panel);
    border:1px solid rgba(255,179,71,.16);border-radius:10px;padding:11px 14px;
    backdrop-filter:blur(10px);box-shadow:0 10px 34px rgba(0,0,0,.55);
    width:min(560px,calc(100vw - 28px))}
  .dockrow{display:flex;align-items:center;gap:10px;width:100%}
  .time{font-size:9px;color:var(--dim);letter-spacing:.5px;min-width:34px;
    text-align:center;font-variant-numeric:tabular-nums}
  #seek{flex:1}
  input[type=range]{-webkit-appearance:none;appearance:none;height:3px;
    border-radius:3px;background:rgba(255,179,71,.22);outline:none;
    cursor:pointer;margin:0}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;
    height:12px;border-radius:50%;background:var(--fg);cursor:pointer;
    box-shadow:0 0 8px rgba(255,179,71,.55)}
  input[type=range]::-moz-range-thumb{width:12px;height:12px;border:none;
    border-radius:50%;background:var(--fg);cursor:pointer}
  .ctl{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
  .ctl .lbl{font-size:9px;letter-spacing:1px;text-transform:uppercase;
    color:var(--dim);white-space:nowrap}
  .ctl .lbl b{color:#cdd6e4;font-weight:600}
  .ctl input[type=range]{flex:1;min-width:40px}
  .btn{border:1px solid rgba(255,179,71,.25);background:rgba(255,179,71,.06);
    color:var(--fg);border-radius:7px;font-family:var(--mono);font-size:10.5px;
    letter-spacing:1px;text-transform:uppercase;cursor:pointer;padding:8px 13px;
    transition:background .15s,border-color .15s;white-space:nowrap}
  .btn:hover{background:rgba(255,179,71,.14);border-color:rgba(255,179,71,.5)}
  .btn.primary{background:rgba(255,77,46,.15);border-color:rgba(255,77,46,.45);color:#ffd9c8}
  .btn.primary:hover{background:rgba(255,77,46,.26)}
  .btn.active{background:rgba(34,224,200,.16);border-color:rgba(34,224,200,.55);
    color:#bff5ec}
  .btn.active:hover{background:rgba(34,224,200,.24)}
  #trackName{font-size:9.5px;color:var(--plasma);letter-spacing:.4px;
    max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #meterWrap{display:flex;gap:3px;align-items:flex-end;height:18px}
  #meterWrap i{width:4px;border-radius:2px;background:var(--fg);opacity:.85;
    height:2px}
  input[type=file]{display:none}

  .btn,.mode{touch-action:manipulation;-webkit-tap-highlight-color:transparent}

  @media (max-width:640px){
    #modes{left:8px;right:8px;transform:none;justify-content:flex-start;
      overflow-x:auto;top:calc(8px + env(safe-area-inset-top));
      scrollbar-width:none}
    #modes::-webkit-scrollbar{display:none}
    .mode{padding:8px 11px;flex:none}
    .mode small{display:none}
    #dock{bottom:calc(10px + env(safe-area-inset-bottom));
      width:calc(100vw - 16px);padding:9px 10px}
    .dockrow{flex-wrap:wrap;row-gap:8px}
    .ctl{min-width:46%}
    #meterWrap{display:none}
    #trackName{max-width:100%}
  }
</style>

<canvas id="stage"></canvas>

<div id="modes">
  <button class="mode on" data-m="0"><span class="k">1</span>Vectorscope<small>lissajous</small></button>
  <button class="mode" data-m="1"><span class="k">2</span>Terreno<small>heightmap</small></button>
  <button class="mode" data-m="2"><span class="k">3</span>Íris<small>radial</small></button>
  <button class="mode" data-m="3"><span class="k">4</span>Fonte<small>partículas</small></button>
  <button class="mode" data-m="4"><span class="k">5</span>Túnel<small>neon</small></button>
  <button class="mode" data-m="5"><span class="k">6</span>Nova<small>impacto</small></button>
</div>

<div id="dock">
  <div class="dockrow">
    <span class="time" id="tCur">0:00</span>
    <input id="seek" type="range" min="0" max="1000" step="1" value="0" />
    <span class="time" id="tDur">0:00</span>
  </div>
  <div class="dockrow">
    <button class="btn primary" id="bLoad">♪ Música</button>
    <button class="btn" id="bPlay">▶</button>
    <button class="btn" id="bMic" title="Usar microfone">🎤</button>
    <span class="ctl">
      <span class="lbl">Vol</span>
      <input id="sVol" type="range" min="0" max="1" step="0.01" value="0.9" />
    </span>
    <span class="ctl">
      <span class="lbl">Impacto <b id="vAmp">1.0</b></span>
      <input id="sAmp" type="range" min="0" max="2.5" step="0.05" value="1.0" />
    </span>
    <span id="meterWrap"><i></i><i></i><i></i><i></i><i></i><i></i></span>
  </div>
  <div class="dockrow">
    <span id="trackName">sem faixa — modo ocioso</span>
  </div>
</div>

<input id="file" type="file" accept="audio/*" />
<audio id="audio"></audio>

<script>
(() => {
  "use strict";

  // ================================================================ CANVAS
  const cv = document.getElementById("stage");
  const ctx = cv.getContext("2d", { alpha: false });
  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, innerWidth < 700 ? 1.5 : 2);
    W = innerWidth; H = innerHeight;
    cv.width = W * DPR; cv.height = H * DPR;
    cv.style.width = W + "px"; cv.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  addEventListener("resize", resize);
  resize();

  // ================================================================ ÁUDIO
  const audioEl = document.getElementById("audio");
  let actx = null, ready = false, gain = null;
  let anL = null, anR = null, anM = null;      // L/R time-domain, Master freq
  let tdL = null, tdR = null, fr = null, tdM = null;
  let split = null, musicSrc = null;
  let micSrc = null, micGain = null, micStream = null, micMode = false;

  const SPEC_N = 96;                            // colunas de espectro usadas
  const spec = new Float32Array(SPEC_N);        // espectro suavizado 0..1
  const energy = { bass: 0, mid: 0, treb: 0, total: 0, balance: 0 };
  let beat = 0;                                 // envelope de batida 0..1
  let bassHist = new Float32Array(48), bhi = 0, beatCd = 0;

  function initAudio() {
    if (actx) return;
    actx = new (window.AudioContext || window.webkitAudioContext)();
    musicSrc = actx.createMediaElementSource(audioEl);
    split = actx.createChannelSplitter(2);

    anL = actx.createAnalyser(); anR = actx.createAnalyser();
    anL.fftSize = anR.fftSize = 2048;
    anL.smoothingTimeConstant = anR.smoothingTimeConstant = 0.5;

    anM = actx.createAnalyser();
    anM.fftSize = 4096;
    anM.smoothingTimeConstant = 0.8;

    split.connect(anL, 0);
    split.connect(anR, 1);

    // Analisadores são GRAMPOS de leitura (não têm saída conectada).
    // Caminho sonoro: música -> gain -> destino. O microfone conecta
    // só nos grampos, nunca no destino — zero risco de microfonia.
    gain = actx.createGain();
    const v0 = parseFloat(document.getElementById("sVol").value);
    gain.gain.value = v0 * v0;
    musicSrc.connect(split);
    musicSrc.connect(anM);
    musicSrc.connect(gain);
    gain.connect(actx.destination);

    tdL = new Float32Array(anL.fftSize);
    tdR = new Float32Array(anR.fftSize);
    tdM = new Float32Array(anM.fftSize);
    fr  = new Uint8Array(anM.frequencyBinCount);
    ready = true;
  }

  function bandAvg(lo, hi) {
    const ny = actx.sampleRate / 2, n = fr.length;
    let a = Math.max(0, Math.floor(lo / ny * n));
    let b = Math.min(n, Math.max(a + 1, Math.ceil(hi / ny * n)));
    let s = 0; for (let i = a; i < b; i++) s += fr[i];
    return s / (b - a) / 255;
  }

  const playing = () => ready && (micMode || !audioEl.paused);

  function readAudio(t) {
    if (playing()) {
      anL.getFloatTimeDomainData(tdL);
      anR.getFloatTimeDomainData(tdR);
      anM.getFloatTimeDomainData(tdM);
      anM.getByteFrequencyData(fr);

      // mic mono: canal R vazio -> sintetiza R como L defasado.
      // O vectorscope vira um "phase plot" do sinal (fica ótimo com voz).
      if (micMode) {
        let sr2 = 0;
        for (let i = 0; i < tdR.length; i += 64) sr2 += tdR[i] * tdR[i];
        if (sr2 < 1e-7) {
          const off = 300, n = tdL.length;
          for (let i = 0; i < n; i++) tdR[i] = tdL[(i + off) % n];
        }
      }

      // espectro comprimido em SPEC_N colunas (escala ~log)
      const nBins = fr.length, maxBin = Math.floor(nBins * 0.72);
      for (let i = 0; i < SPEC_N; i++) {
        const t0 = i / SPEC_N, t1 = (i + 1) / SPEC_N;
        const a = Math.floor(Math.pow(t0, 1.7) * maxBin);
        const b = Math.max(a + 1, Math.floor(Math.pow(t1, 1.7) * maxBin));
        let s = 0; for (let k = a; k < b; k++) s += fr[k];
        const v = (s / (b - a) / 255) * (0.75 + 0.6 * (i / SPEC_N)); // realça agudos
        spec[i] += (Math.min(1, v) - spec[i]) * 0.42;
      }

      const bass = Math.min(1, bandAvg(20, 250) * 1.25);
      energy.bass += (bass - energy.bass) * 0.3;
      energy.mid  += (Math.min(1, bandAvg(250, 2000) * 1.5) - energy.mid) * 0.3;
      energy.treb += (Math.min(1, bandAvg(2000, 9000) * 2.1) - energy.treb) * 0.3;
      energy.total = (energy.bass + energy.mid + energy.treb) / 3;

      // balanço estéreo: -1 (esquerda) .. +1 (direita), via RMS subsample
      let sl = 0, sr = 0;
      for (let i = 0; i < tdL.length; i += 32) { sl += tdL[i] * tdL[i]; sr += tdR[i] * tdR[i]; }
      const bal = Math.sqrt(sr) - Math.sqrt(sl);
      energy.balance += (Math.max(-1, Math.min(1, bal * 3)) - energy.balance) * 0.08;

      let avg = 0; for (let k = 0; k < bassHist.length; k++) avg += bassHist[k];
      avg /= bassHist.length;
      if (beatCd <= 0 && bass > 0.16 && bass > avg * 1.3) { beat = 1; beatCd = 9; }
      if (beatCd > 0) beatCd--;
      bassHist[bhi] = bass; bhi = (bhi + 1) % bassHist.length;
    } else {
      // ---- modo ocioso: sinal sintético p/ nunca ficar tela morta
      const s = t / 1000;
      for (let i = 0; i < SPEC_N; i++) {
        const v = 0.18 + 0.16 * Math.sin(s * 1.4 + i * 0.22)
                       * Math.sin(s * 0.6 + i * 0.05);
        spec[i] += (Math.max(0, v) - spec[i]) * 0.06;
      }
      energy.bass += (0.22 + 0.15 * Math.sin(s * 1.1) - energy.bass) * 0.04;
      energy.mid  += (0.18 + 0.12 * Math.sin(s * 1.9 + 2) - energy.mid) * 0.04;
      energy.treb += (0.14 + 0.10 * Math.sin(s * 2.7 + 4) - energy.treb) * 0.04;
      energy.total = (energy.bass + energy.mid + energy.treb) / 3;
      energy.balance += (Math.sin(s * 0.5) * 0.35 - energy.balance) * 0.03;
      if (Math.sin(s * 2.2) > 0.995 && beat < 0.1) beat = 0.7;
      // lissajous ocioso: curvas paramétricas suaves
      if (!tdL) { tdL = new Float32Array(2048); tdR = new Float32Array(2048); tdM = new Float32Array(2048); }
      for (let i = 0; i < tdL.length; i++) {
        const p = i / tdL.length * Math.PI * 2;
        tdL[i] = Math.sin(p * 3 + s * 1.3) * 0.5;
        tdR[i] = Math.sin(p * 2 + s * 0.9 + 1.2) * 0.5;
        tdM[i] = Math.sin(p * 4 + s) * 0.35;
      }
    }
    beat *= 0.90; // decaimento do envelope de batida
  }

  // ================================================================ MODOS
  let mode = 0;
  let irisRot = 0;
  const amp = [1, 1, 1, 1, 1, 1];  // impacto do áudio, individual por visualização

  // ---- estado do [3] fonte: partículas lançadas pelo espectro
  const FP_MAX = 760;
  const ffx = new Float32Array(FP_MAX), ffy = new Float32Array(FP_MAX);
  const ffvx = new Float32Array(FP_MAX), ffvy = new Float32Array(FP_MAX);
  const fflife = new Float32Array(FP_MAX), ffhue = new Float32Array(FP_MAX);
  const ffsz = new Float32Array(FP_MAX);
  let ffHead = 0;

  // ---- estado do [4] túnel: anéis + campo de estrelas + warp de batida
  const RING_PTS = 36;
  const MAX_RINGS = 56;
  const rings = [];                 // {z, hue, isBeat, loud, shape:Float32Array}
  let ringAcc = 0, tunnelWarp = 0, tunnelLatch = false;
  const ST_N = 130;
  const stAng = new Float32Array(ST_N), stDist = new Float32Array(ST_N);
  for (let i = 0; i < ST_N; i++) { stAng[i] = Math.random() * Math.PI * 2; stDist[i] = Math.random(); }

  // ---- estado do [5] nova: explosões dirigidas pelo impacto da música
  const NP_MAX = 420;
  const nvx = new Float32Array(NP_MAX), nvy = new Float32Array(NP_MAX);
  const nvvx = new Float32Array(NP_MAX), nvvy = new Float32Array(NP_MAX);
  const nvlife = new Float32Array(NP_MAX), nvhue = new Float32Array(NP_MAX);
  const nvsz = new Float32Array(NP_MAX);
  let nvHead = 0;                   // pool circular
  const novaRings = [];             // ondas de choque {r, life}
  let novaShake = 0, novaFlash = 0, novaLatch = false, novaCharge = 0;

  // ---------- fundo com rastro (cada modo pede um fade diferente)
  function fade(alpha) {
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = `rgba(5,7,15,${alpha})`;
    ctx.fillRect(0, 0, W, H);
  }

  // ---------------------------------------------------- [0] VECTORSCOPE
  function drawScope() {
    fade(0.13);                                  // rastro longo: fio persistente
    const A = amp[0];
    const kBass = energy.bass * A, kTreb = energy.treb * A;
    const kTot = energy.total * A, kBeat = beat * A;
    const cx = W / 2, cy = H / 2;
    const R = Math.min(W, H) * (0.30 + kBass * 0.10 + kBeat * 0.05);

    ctx.globalCompositeOperation = "lighter";

    // grade sutil de osciloscópio
    ctx.strokeStyle = "rgba(102,116,138,0.10)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - R * 1.25, cy); ctx.lineTo(cx + R * 1.25, cy);
    ctx.moveTo(cx, cy - R * 1.25); ctx.lineTo(cx, cy + R * 1.25);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(cx, cy, R * 1.1, 0, Math.PI * 2);
    ctx.stroke();

    // fio principal L/R — passa 2x: halo largo + núcleo fino
    const n = tdL.length, step = 2;
    const hue = 165 + kTreb * 90;                // ciano -> violeta com agudos
    for (let pass = 0; pass < 2; pass++) {
      ctx.beginPath();
      for (let i = 0; i < n; i += step) {
        const x = cx + tdL[i] * R * 1.9;
        const y = cy - tdR[i] * R * 1.9;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      if (pass === 0) {
        ctx.strokeStyle = `hsla(${hue},95%,60%,${0.10 + kBeat * 0.12})`;
        ctx.lineWidth = 7 + kBeat * 9;
      } else {
        ctx.strokeStyle = `hsla(${hue},100%,${68 + Math.min(30, kBeat * 18)}%,0.85)`;
        ctx.lineWidth = 1.4;
      }
      ctx.stroke();
    }

    // farpas de grave: raios curtos que saltam do centro no beat
    if (kBeat > 0.25) {
      ctx.strokeStyle = `rgba(255,77,46,${Math.min(1, kBeat * 0.5)})`;
      ctx.lineWidth = 1.5;
      for (let k = 0; k < 12; k++) {
        const a = (k / 12) * Math.PI * 2 + irisRot;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * R * 1.15, cy + Math.sin(a) * R * 1.15);
        ctx.lineTo(cx + Math.cos(a) * (R * 1.15 + 18 * kBeat), cy + Math.sin(a) * (R * 1.15 + 18 * kBeat));
        ctx.stroke();
      }
    }
    irisRot += 0.002 + kTot * 0.004;
    ctx.globalCompositeOperation = "source-over";
  }

  // ---------------------------------------------------- [1] TERRENO
  const ROWS = 56;
  const terrain = [];                            // fila de linhas de espectro
  for (let r = 0; r < ROWS; r++) terrain.push(new Float32Array(SPEC_N));
  let terrAcc = 0;

  function drawTerrain(dt) {
    fade(0.55);                                  // pouco rastro: nitidez do wireframe

    const A = amp[1];
    // empurra nova linha ao ritmo (~30 linhas/s, mais rápido com energia)
    terrAcc += dt * (26 + energy.total * A * 34);
    while (terrAcc >= 1) {
      terrAcc -= 1;
      const row = terrain.pop();
      row.set(spec);
      terrain.unshift(row);                      // índice 0 = mais recente (perto)
    }

    const horizon = H * 0.32;
    const baseY = H * 0.94;
    const camAmp = Math.min(W, H) * (0.34 + beat * A * 0.10) * A;

    ctx.globalCompositeOperation = "lighter";
    // desenha de trás pra frente
    for (let r = ROWS - 1; r >= 0; r--) {
      const z = r / (ROWS - 1);                  // 0 = perto, 1 = horizonte
      const persp = 1 / (1 + z * 4.2);           // fator de perspectiva
      const y0 = horizon + (baseY - horizon) * persp;
      const half = W * (0.06 + 1.05 * persp);
      const row = terrain[r];

      // cor: brasa perto, esfria pro fundo
      const heat = 1 - z;
      const cr = 255, cg = Math.floor(60 + 130 * heat), cb = Math.floor(40 + 30 * (1 - heat));
      const alpha = 0.10 + 0.62 * heat;

      ctx.beginPath();
      for (let i = 0; i < SPEC_N; i++) {
        // espelha: agudo nas bordas, grave no centro (montanha central)
        const half_i = Math.abs(i / (SPEC_N - 1) * 2 - 1);      // 0 centro..1 borda
        const bin = Math.floor(half_i * (SPEC_N - 1));
        const h = row[bin] * camAmp * persp * (1.25 - half_i * 0.55);
        const x = W / 2 - half + (i / (SPEC_N - 1)) * half * 2;
        const y = y0 - h;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = `rgba(${cr},${cg},${cb},${alpha})`;
      ctx.lineWidth = r === 0 ? 2 : 1.1;
      ctx.stroke();
    }

    // sol/reator no horizonte, pulsa com o grave
    const sunR = 26 + (energy.bass * 46 + beat * 18) * A;
    const g = ctx.createRadialGradient(W/2, horizon, 0, W/2, horizon, sunR * 3);
    g.addColorStop(0, `rgba(255,120,50,${Math.min(0.9, 0.5 + beat * A * 0.3)})`);
    g.addColorStop(0.4, "rgba(255,77,46,0.18)");
    g.addColorStop(1, "rgba(255,77,46,0)");
    ctx.fillStyle = g;
    ctx.fillRect(W/2 - sunR*3, horizon - sunR*3, sunR*6, sunR*6);
    ctx.globalCompositeOperation = "source-over";
  }

  // ---------------------------------------------------- [2] ÍRIS
  function drawIris() {
    fade(0.20);
    const A = amp[2];
    const kBeat = beat * A;
    const cx = W / 2, cy = H / 2;
    const base = Math.min(W, H) * 0.16;
    const R = base * (1 + (energy.bass * 0.35 + beat * 0.22) * A);

    irisRot += 0.0025 + (energy.mid * 0.010 + beat * 0.02) * A;
    ctx.globalCompositeOperation = "lighter";

    // pétalas de espectro: espelhadas em N setores
    const SEG = 2;                                // espelha em 2 metades
    const perSeg = SPEC_N;
    for (let s = 0; s < SEG; s++) {
      const dir = s === 0 ? 1 : -1;
      for (let i = 0; i < perSeg; i++) {
        const v = spec[i];
        if (v < 0.02) continue;
        const a = irisRot + dir * (i / perSeg) * Math.PI;
        const len = v * base * 2.4 * A;
        const x0 = cx + Math.cos(a) * R, y0 = cy + Math.sin(a) * R;
        const x1 = cx + Math.cos(a) * (R + len), y1 = cy + Math.sin(a) * (R + len);
        // gradiente de cor pelo índice: grave=heat, médio=plasma, agudo=arc
        const t = i / perSeg;
        let col;
        if (t < 0.33)      col = `rgba(255,77,46,${0.25 + v * 0.6})`;
        else if (t < 0.66) col = `rgba(34,224,200,${0.22 + v * 0.6})`;
        else               col = `rgba(162,75,255,${0.22 + v * 0.65})`;
        ctx.strokeStyle = col;
        ctx.lineWidth = 1.6 + v * 2.6;
        ctx.beginPath();
        ctx.moveTo(x0, y0); ctx.lineTo(x1, y1);
        ctx.stroke();
      }
    }

    // anel interno de waveform
    const n = tdM.length, step = 8;
    ctx.beginPath();
    for (let i = 0; i <= n - step; i += step) {
      const a = (i / n) * Math.PI * 2 + irisRot * 0.5;
      const rr = R * 0.82 + tdM[i] * base * 0.9 * A;
      const x = cx + Math.cos(a) * rr, y = cy + Math.sin(a) * rr;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = `rgba(255,214,150,${Math.min(1, 0.5 + kBeat * 0.4)})`;
    ctx.lineWidth = 1.6;
    ctx.stroke();

    // núcleo
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 0.6);
    g.addColorStop(0, `rgba(255,180,100,${Math.min(0.95, 0.30 + kBeat * 0.45)})`);
    g.addColorStop(1, "rgba(255,120,60,0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, R * 0.6, 0, Math.PI * 2); ctx.fill();

    ctx.globalCompositeOperation = "source-over";
  }

  // ---------------------------------------------------- [3] FONTE
  // o espectro vira física: cada banda lança partículas do chão com força
  // proporcional à sua energia. Grave = brasa ao centro-esquerda, agudo =
  // arco violeta à direita. Gravidade puxa de volta; drops viram erupções.
  function ffSpawn(x, y, vx, vy, hue, sz) {
    const i = ffHead; ffHead = (ffHead + 1) % FP_MAX;
    ffx[i] = x; ffy[i] = y; ffvx[i] = vx; ffvy[i] = vy;
    fflife[i] = 0.8 + Math.random() * 0.6;
    ffhue[i] = hue; ffsz[i] = sz;
  }

  function bandHue(t) {           // posição 0..1 no espectro -> matiz da paleta
    if (t < 0.33) return 14 + t * 30;          // heat
    if (t < 0.66) return 168 + (t - 0.33) * 40; // plasma
    return 268 + (t - 0.66) * 40;               // arc
  }

  function drawFonte(dt) {
    fade(0.20);
    const A = amp[3];
    const grav = H * 0.55;                      // px/s²
    const floor = H * 0.96;
    const margin = W * 0.06;
    const span = W - margin * 2;

    // emissão contínua dirigida pelo espectro
    for (let i = 0; i < SPEC_N; i++) {
      const v = spec[i] * A;
      if (v < 0.05) continue;
      // probabilidade de emitir cresce com a energia da banda
      if (Math.random() < v * 0.9) {
        const t = i / (SPEC_N - 1);
        const x = margin + t * span + (Math.random() - 0.5) * span * 0.02;
        const lean = (t - 0.5) * 60;            // bordas inclinam pra fora
        ffSpawn(x, floor,
                lean * dt * 8 + (Math.random() - 0.5) * 30 * dt * 60 * 0.016,
                -(H * (0.35 + v * 0.85)) * 0.016,
                bandHue(t), 1.6 + v * 2.6);
      }
    }

    // batida: erupção em massa nas bandas mais fortes
    if (beat > 0.6) {
      for (let k = 0; k < 26; k++) {
        const i = (Math.random() * SPEC_N) | 0;
        if (spec[i] < 0.15) continue;
        const t = i / (SPEC_N - 1);
        const x = margin + t * span;
        ffSpawn(x, floor,
                (Math.random() - 0.5) * 90 * 0.016,
                -(H * (0.5 + spec[i] * A * 0.9)) * 0.016,
                bandHue(t), 2.2 + spec[i] * 3);
      }
    }

    // física + desenho
    ctx.globalCompositeOperation = "lighter";
    const g = grav * dt * 0.016 * 60;
    for (let i = 0; i < FP_MAX; i++) {
      if (fflife[i] <= 0) continue;
      fflife[i] -= dt * 0.9;
      ffvy[i] += g * dt;
      ffvx[i] *= 0.995;
      ffx[i] += ffvx[i]; ffy[i] += ffvy[i];
      if (ffy[i] > floor + 4) { fflife[i] = 0; continue; }   // tocou o chão: morre
      const l = Math.max(0, Math.min(1, fflife[i]));
      const s = ffsz[i] * (0.5 + l * 0.7);
      ctx.fillStyle = `hsla(${ffhue[i]},100%,${52 + l * 22}%,${l * 0.9})`;
      ctx.fillRect(ffx[i] - s / 2, ffy[i] - s / 2, s, s);
    }

    // linha do chão: o espectro ao vivo brilhando como lava sob a fonte
    for (let i = 0; i < SPEC_N; i++) {
      const v = Math.min(1, spec[i] * A);
      if (v < 0.02) continue;
      const t = i / (SPEC_N - 1);
      const x = margin + t * span;
      const wCol = span / SPEC_N;
      ctx.fillStyle = `hsla(${bandHue(t)},100%,${40 + v * 30}%,${0.25 + v * 0.5})`;
      ctx.fillRect(x - wCol / 2, floor, wCol, 3 + v * 5);
    }
    ctx.globalCompositeOperation = "source-over";
  }

  // ---------------------------------------------------- [4] TÚNEL
  function drawTunnel(dt) {
    fade(0.30);
    const A = amp[4];

    // warp: batida forte injeta velocidade e streaks (decai sozinho)
    if (beat > 0.85 && !tunnelLatch) { tunnelLatch = true; tunnelWarp = Math.min(1.6, 0.6 + energy.bass * A); }
    if (beat < 0.35) tunnelLatch = false;
    tunnelWarp *= 0.94;

    // câmera: deriva com o balanço estéreo + flutuação suave
    const cx = W / 2 + energy.balance * W * 0.07 * A + Math.sin(irisRot * 3.1) * W * 0.025 * A;
    const cy = H / 2 + Math.cos(irisRot * 2.3) * H * 0.03 * A;
    irisRot += dt * (0.10 + energy.mid * A * 0.35);

    const speedK = 0.22 + energy.bass * A * 0.55 + tunnelWarp * 0.9;

    // ---- campo de estrelas: profundidade + velocidade musical
    ctx.globalCompositeOperation = "lighter";
    const maxR = Math.max(W, H) * 0.75;
    for (let i = 0; i < ST_N; i++) {
      stDist[i] += dt * speedK * (0.25 + stDist[i]);
      if (stDist[i] > 1) { stDist[i] = 0.03 + Math.random() * 0.08; stAng[i] = Math.random() * Math.PI * 2; }
      const d0 = stDist[i] * stDist[i];
      const d1 = Math.min(1, stDist[i] + 0.015 + tunnelWarp * 0.05);
      const r0 = d0 * maxR, r1 = d1 * d1 * maxR;
      const ca = Math.cos(stAng[i]), sa = Math.sin(stAng[i]);
      ctx.strokeStyle = `rgba(180,210,255,${0.05 + d0 * 0.5})`;
      ctx.lineWidth = 0.8 + d0 * 1.6;
      ctx.beginPath();
      ctx.moveTo(cx + ca * r0, cy + sa * r0);
      ctx.lineTo(cx + ca * r1, cy + sa * r1);
      ctx.stroke();
    }

    // nascem anéis no fundo; guardam o "volume" do instante
    ringAcc += dt * (5 + energy.total * A * 8);
    while (ringAcc >= 1) {
      ringAcc -= 1;
      if (rings.length >= MAX_RINGS) continue;
      const shape = new Float32Array(RING_PTS);
      for (let k = 0; k < RING_PTS; k++) {
        const si = Math.floor(Math.abs(k / RING_PTS * 2 - 1) * (SPEC_N - 1));
        shape[k] = Math.pow(spec[si], 0.75);      // expoente <1: realça o médio-baixo
      }
      rings.push({
        z: 1,
        hue: 165 + energy.treb * A * 110 + Math.sin(irisRot) * 20,
        isBeat: beat > 0.35,
        loud: Math.min(1, energy.total * 1.6),    // volume do instante do nascimento
        shape
      });
    }

    // avanço linear (+ warp): silêncio = lento e escuro, drop = rápido e vivo
    const flySpeed = dt * (0.26 + speedK * 0.5);
    for (let r = rings.length - 1; r >= 0; r--) {
      rings[r].z -= flySpeed;
      if (rings[r].z <= 0.01) rings.splice(r, 1);
    }

    const baseR = Math.min(W, H) * 0.9;
    for (let r = rings.length - 1; r >= 0; r--) {
      const g = rings[r];
      const persp = (1 - g.z) * (1 - g.z);
      const bright = 0.25 + g.loud * 1.1;         // anel carrega o volume do seu instante
      const alpha = Math.min(0.95, (0.04 + persp * (g.isBeat ? 1.0 : 0.5)) * bright);
      if (alpha < 0.05) continue;
      const R = 8 + persp * baseR;
      ctx.beginPath();
      for (let k = 0; k <= RING_PTS; k++) {
        const i = k % RING_PTS;
        const a = (i / RING_PTS) * Math.PI * 2 + irisRot * (g.isBeat ? 1.5 : 1);
        const rr = R * (1 + g.shape[i] * A * 0.62);  // modulação bem mais visível
        const x = cx + Math.cos(a) * rr;
        const y = cy + Math.sin(a) * rr;
        k === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = g.isBeat
        ? `hsla(18,100%,60%,${alpha})`
        : `hsla(${g.hue},95%,${50 + g.loud * 22}%,${alpha})`;
      ctx.lineWidth = (g.isBeat ? 2.6 : 1.2) * (0.7 + g.loud * 0.9);
      ctx.stroke();
    }

    // streaks de warp: raios longos irradiando no drop
    if (tunnelWarp > 0.12) {
      ctx.strokeStyle = `rgba(255,150,80,${tunnelWarp * 0.35})`;
      ctx.lineWidth = 1.4;
      for (let k = 0; k < 14; k++) {
        const a = (k / 14) * Math.PI * 2 + irisRot * 2;
        const r0 = 40 + Math.random() * 60;
        const r1 = r0 + 130 * tunnelWarp + Math.random() * 80;
        ctx.beginPath();
        ctx.moveTo(cx + Math.cos(a) * r0, cy + Math.sin(a) * r0);
        ctx.lineTo(cx + Math.cos(a) * r1, cy + Math.sin(a) * r1);
        ctx.stroke();
      }
    }

    // brilho no ponto de fuga
    const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 90 + (beat + tunnelWarp) * A * 110);
    cg.addColorStop(0, `rgba(255,160,90,${0.20 + (beat + tunnelWarp) * A * 0.25})`);
    cg.addColorStop(1, "rgba(255,120,60,0)");
    ctx.fillStyle = cg;
    ctx.fillRect(cx - 300, cy - 300, 600, 600);
    ctx.globalCompositeOperation = "source-over";
  }

  // ---------------------------------------------------- [5] NOVA
  // foco em IMPACTO: o núcleo carrega com a energia da faixa e cada batida
  // detona uma explosão de partículas + onda de choque + tremor + flash.
  function novaSpawn(cx, cy, count, speed, hueBase, hueSpread, size) {
    for (let k = 0; k < count; k++) {
      const i = nvHead; nvHead = (nvHead + 1) % NP_MAX;
      const a = Math.random() * Math.PI * 2;
      const sp = speed * (0.35 + Math.random() * 0.9);
      nvx[i] = cx; nvy[i] = cy;
      nvvx[i] = Math.cos(a) * sp; nvvy[i] = Math.sin(a) * sp;
      nvlife[i] = 0.7 + Math.random() * 0.5;
      nvhue[i] = hueBase + (Math.random() - 0.5) * hueSpread;
      nvsz[i] = size * (0.6 + Math.random() * 0.8);
    }
  }

  function drawNova(dt) {
    fade(0.22);
    const A = amp[5];
    const kBeat = beat * A;

    // tremor de tela: desloca tudo por alguns px após cada detonação
    novaShake *= 0.86;
    const sx = (Math.random() - 0.5) * novaShake;
    const sy = (Math.random() - 0.5) * novaShake;
    const cx = W / 2 + sx, cy = H / 2 + sy;
    const base = Math.min(W, H) * 0.11;

    // detonação na SUBIDA do envelope de batida (borda, não nível)
    if (beat > 0.85 && !novaLatch) {
      novaLatch = true;
      const power = Math.min(2, 0.6 + energy.bass * 1.2) * Math.max(0.3, A);
      novaSpawn(cx, cy, Math.floor(50 + 70 * power), (220 + 260 * power) * dt * 60 * 0.016,
                18, 30, 2.6);                                  // brasa
      novaRings.push({ r: base * 1.1, life: 1 });
      novaShake = 4 + 9 * power;
      novaFlash = Math.min(1, 0.35 + 0.4 * power);
      novaCharge = 0;                                          // descarrega
    }
    if (beat < 0.35) novaLatch = false;

    // carga contínua entre batidas (energia acumulando no núcleo)
    novaCharge = Math.min(1, novaCharge + dt * (0.25 + energy.total * A * 0.9));

    // faíscas contínuas de agudo (impacto fino, não só o bumbo)
    if (energy.treb * A > 0.12 && Math.random() < energy.treb * A * 0.8) {
      novaSpawn(cx, cy, 2, 90 * 0.016, 268, 40, 1.5);          // violeta
    }

    ctx.globalCompositeOperation = "lighter";

    // flash de tela inteira no hit
    if (novaFlash > 0.02) {
      ctx.fillStyle = `rgba(255,140,70,${novaFlash * 0.16})`;
      ctx.fillRect(0, 0, W, H);
      novaFlash *= 0.82;
    }

    // partículas (pool circular; mortas têm life<=0 e são puladas)
    for (let i = 0; i < NP_MAX; i++) {
      if (nvlife[i] <= 0) continue;
      nvlife[i] -= dt * 1.15;
      nvvx[i] *= 0.965; nvvy[i] *= 0.965;
      nvx[i] += nvvx[i]; nvy[i] += nvvy[i];
      const l = Math.max(0, nvlife[i]);
      ctx.fillStyle = `hsla(${nvhue[i]},100%,${55 + l * 20}%,${l * 0.85})`;
      const s = nvsz[i] * (0.5 + l);
      ctx.fillRect(nvx[i] - s / 2, nvy[i] - s / 2, s, s);
    }

    // ondas de choque
    for (let k = novaRings.length - 1; k >= 0; k--) {
      const g = novaRings[k];
      g.r += (14 + kBeat * 10) * dt * 60;
      g.life -= dt * 1.6;
      if (g.life <= 0) { novaRings.splice(k, 1); continue; }
      ctx.beginPath();
      ctx.arc(cx, cy, g.r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,120,60,${g.life * 0.55})`;
      ctx.lineWidth = 2.5 * g.life + 0.5;
      ctx.stroke();
    }

    // núcleo: pulsa com o grave, brilha com a carga acumulada
    const R = base * (0.8 + energy.bass * A * 0.7 + kBeat * 0.35);
    const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 2.2);
    g.addColorStop(0, `rgba(255,190,120,${0.45 + novaCharge * 0.35 + kBeat * 0.2})`);
    g.addColorStop(0.35, `rgba(255,100,50,${0.22 + novaCharge * 0.20})`);
    g.addColorStop(1, "rgba(255,77,46,0)");
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, R * 2.2, 0, Math.PI * 2); ctx.fill();

    // anel de waveform orbitando o núcleo (o "corpo" do som agora)
    const n = tdM.length, step = 8;
    ctx.beginPath();
    for (let i = 0; i <= n - step; i += step) {
      const a = (i / n) * Math.PI * 2 + irisRot;
      const rr = R * 1.35 + tdM[i] * base * 1.4 * A;
      const x = cx + Math.cos(a) * rr, y = cy + Math.sin(a) * rr;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = `rgba(34,224,200,${0.40 + kBeat * 0.4})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    irisRot += dt * (0.3 + energy.mid * A * 1.2);

    ctx.globalCompositeOperation = "source-over";
  }

  // ================================================================ LOOP
  let last = performance.now();
  function frame(t) {
    const dt = Math.min(0.05, (t - last) / 1000);
    last = t;
    readAudio(t);
    if (mode === 0) drawScope();
    else if (mode === 1) drawTerrain(dt);
    else if (mode === 2) drawIris();
    else if (mode === 3) drawFonte(dt);
    else if (mode === 4) drawTunnel(dt);
    else drawNova(dt);
    updateDock();
    requestAnimationFrame(frame);
  }
  // primeira pintura cheia do fundo
  ctx.fillStyle = "#05070f"; ctx.fillRect(0, 0, W, H);
  requestAnimationFrame(frame);

  // ================================================================ UI
  const $ = id => document.getElementById(id);
  const modeBtns = [...document.querySelectorAll(".mode")];

  function setMode(m) {
    mode = m;
    modeBtns.forEach((b, i) => b.classList.toggle("on", i === m));
    ctx.fillStyle = "#05070f"; ctx.fillRect(0, 0, W, H);  // limpa rastro do modo anterior
    if (m === 3) fflife.fill(0);                           // fonte recomeça limpa
    if (m === 4) { rings.length = 0; tunnelWarp = 0; }     // túnel sem anéis velhos
    if (m === 5) { nvlife.fill(0); novaRings.length = 0; novaShake = 0; }
    $("sAmp").value = amp[m];                              // slider mostra o impacto DESTE modo
    $("vAmp").textContent = amp[m].toFixed(1);
  }
  modeBtns.forEach(b => b.onclick = () => setMode(+b.dataset.m));
  addEventListener("keydown", e => {
    if (e.key >= "1" && e.key <= "6") setMode(+e.key - 1);
    if (e.key === " ") { e.preventDefault(); $("bPlay").click(); }
  });

  const fileInput = $("file");
  const bMic = $("bMic");

  // ---- microfone: conecta só nos analisadores (nunca no alto-falante)
  async function enableMic() {
    initAudio();
    if (actx.state === "suspended") await actx.resume();
    try {
      micStream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }
      });
    } catch (err) {
      $("trackName").textContent = "acesso ao microfone negado — verifique as permissões";
      return;
    }
    if (!audioEl.paused) { audioEl.pause(); $("bPlay").textContent = "▶"; }
    musicSrc.disconnect();                        // música sai dos grampos e da saída
    micSrc = actx.createMediaStreamSource(micStream);
    micGain = actx.createGain();
    micGain.gain.value = 3.0;                     // mic é mais fraco que música mixada
    micSrc.connect(micGain);
    micGain.connect(split);
    micGain.connect(anM);
    micMode = true;
    bMic.classList.add("active");
    $("trackName").textContent = "🎤 microfone ao vivo — fale, cante, bata palma";
  }

  function disableMic() {
    if (micGain) micGain.disconnect();
    if (micSrc) micSrc.disconnect();
    if (micStream) micStream.getTracks().forEach(tk => tk.stop());  // solta o hardware
    micSrc = micGain = micStream = null;
    micMode = false;
    bMic.classList.remove("active");
    // religa a música nos grampos e na saída
    musicSrc.connect(split);
    musicSrc.connect(anM);
    musicSrc.connect(gain);
    $("trackName").textContent = audioEl.src
      ? "♪ " + (fileInput.files[0] ? fileInput.files[0].name : "faixa carregada")
      : "sem faixa — modo ocioso";
  }

  bMic.onclick = () => { micMode ? disableMic() : enableMic(); };

  $("bLoad").onclick = () => fileInput.click();
  fileInput.onchange = e => {
    const f = e.target.files[0];
    if (!f) return;
    initAudio();
    if (micMode) disableMic();                    // carregar música sai do modo mic
    audioEl.src = URL.createObjectURL(f);
    $("trackName").textContent = "♪ " + f.name;
    if (actx.state === "suspended") actx.resume();
    audioEl.play().then(() => $("bPlay").textContent = "❚❚").catch(() => {});
  };
  $("bPlay").onclick = () => {
    if (micMode) disableMic();                    // play volta pro modo música
    if (!audioEl.src) { fileInput.click(); return; }
    initAudio();
    if (actx.state === "suspended") actx.resume();
    if (audioEl.paused) { audioEl.play(); $("bPlay").textContent = "❚❚"; }
    else { audioEl.pause(); $("bPlay").textContent = "▶"; }
  };
  audioEl.onended = () => $("bPlay").textContent = "▶";

  // ---- volume: mexe só no GainNode (pós-análise). O elemento fica em 100%
  // pra que os analisadores sempre leiam o sinal cheio — visual constante.
  const sVol = $("sVol");
  audioEl.volume = 1;
  sVol.oninput = () => {
    const v = parseFloat(sVol.value);
    if (gain) gain.gain.setTargetAtTime(v * v, actx.currentTime, 0.02); // curva quadrática: mais controle no baixo volume
  };

  // ---- impacto (por modo)
  const sAmp = $("sAmp");
  sAmp.oninput = () => {
    amp[mode] = parseFloat(sAmp.value);
    $("vAmp").textContent = amp[mode].toFixed(1);
  };

  // ---- seek + tempo
  const seek = $("seek"), tCur = $("tCur"), tDur = $("tDur");
  let seeking = false;
  const fmt = s => {
    if (!isFinite(s)) return "0:00";
    const m = Math.floor(s / 60), r = Math.floor(s % 60);
    return m + ":" + String(r).padStart(2, "0");
  };
  seek.addEventListener("input", () => {
    seeking = true;
    if (isFinite(audioEl.duration)) {
      tCur.textContent = fmt(seek.value / 1000 * audioEl.duration);
    }
  });
  seek.addEventListener("change", () => {
    if (isFinite(audioEl.duration)) {
      audioEl.currentTime = seek.value / 1000 * audioEl.duration;
    }
    seeking = false;
  });
  audioEl.addEventListener("loadedmetadata", () => { tDur.textContent = fmt(audioEl.duration); });
  audioEl.addEventListener("timeupdate", () => {
    tCur.textContent = fmt(audioEl.currentTime);
    if (!seeking && isFinite(audioEl.duration) && audioEl.duration > 0) {
      seek.value = Math.round(audioEl.currentTime / audioEl.duration * 1000);
    }
  });

  // mini-medidor no dock
  const bars = [...document.querySelectorAll("#meterWrap i")];
  function updateDock() {
    const src = [energy.bass, energy.bass, energy.mid, energy.mid, energy.treb, energy.treb];
    for (let i = 0; i < bars.length; i++) {
      bars[i].style.height = Math.max(2, src[i] * 18) + "px";
      bars[i].style.opacity = 0.35 + src[i] * 0.65;
    }
  }
  // ================================================================ PWA
  if ("serviceWorker" in navigator &&
      (location.protocol === "https:" || location.hostname === "localhost")) {
    addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
})();
</script>
